name: Evolution X Build Test for Pixel 5 (redfin)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Space (強力な削除)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/openjdk*
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get clean
          df -h # 消した後の空き容量をログに出力

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3
          # repoコマンドのインストール
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Evolution X Source
        run: |
          mkdir ~/evo
          cd ~/evo
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          # --depth=1 に加え、不要なフォルダを同期しないようにオプションを追加
          repo init -u https://github.com/Evolution-X/manifest -b bq2 --depth=1 --no-tags --no-clone-bundle
          
          # 同期するスレッド数を少し抑えて、安定して完了させる
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --current-branch

      - name: Sync Device Specific Trees
        run: |
          cd ~/evo
          git clone https://github.com/Evolution-X-Devices/device_google_redfin -b bq2 device/google/redfin
          git clone https://github.com/Evolution-X-Devices/vendor_google_redfin -b bq2 vendor/google/redfin
          git clone https://github.com/Evolution-X-Devices/kernel_google_redbull -b bq2 kernel/google/redbull

      - name: Check Sync Result
        run: |
          echo "Sync completed successfully!"
          ls -R ~/evo/device/google/redfin
